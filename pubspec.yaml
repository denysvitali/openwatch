name: openwatch
description: >-
  Open-source companion app to manage Oudmon-based BLE smartwatches
  (reverse-engineered from com.qcwireless.qcwatch).
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE transport
  flutter_blue_plus: ^1.35.5
  permission_handler: ^12.0.0

  # Observability — OpenTelemetry OTLP/HTTP tracer + lifecycle observer.
  # Mirrors the happy_flutter integration so traces land in the same
  # collector (otel.k2.k8s.best).
  flutterrific_opentelemetry: ^0.4.0
  dartastic_opentelemetry: 1.0.2-alpha
  dartastic_opentelemetry_api: 1.0.0-alpha
  package_info_plus: ^10.1.0

  # State management and routing
  flutter_riverpod: ^3.2.0
  go_router: ^17.0.1

  # Data models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Cloud (opt-in only; app is offline-first)
  dio: ^5.9.0
  crypto: ^3.0.6

  # Storage
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5

  # UI / utilities
  intl: ^0.20.2
  collection: ^1.19.0
  cupertino_icons: ^1.0.8

dependency_overrides:
  # flutterrific_opentelemetry 0.4.0 caps go_router at ^14.8.1, but the
  # route observer API used here is compatible with the app's current v17.
  go_router: 17.3.0
  # flutterrific_opentelemetry 0.4.0 has not adopted the beta API yet.
  dartastic_opentelemetry: 1.0.2-alpha
  dartastic_opentelemetry_api: 1.0.0-alpha

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.26.3
  build_runner: ^2.5.0
  freezed: ^3.1.0
  json_serializable: ^6.10.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

name: Flutter CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze-and-test
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) ||
      (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '+'))
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Determine build metadata
        id: build_meta
        run: |
          SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1 | tr -d ' ')
          BUILD_NUMBER=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} ))
          # include the run id so each master push gets a fresh, unique tag
          UNIQUE_TAG="v${SEMVER}+${BUILD_NUMBER}-${GITHUB_SHA::7}"
          echo "SEMVER=$SEMVER" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "UNIQUE_TAG=$UNIQUE_TAG" >> $GITHUB_OUTPUT
          echo "Building version $SEMVER+$BUILD_NUMBER (tag $UNIQUE_TAG)"

      - name: Prepare signing keystore
        id: keystore
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::Keystore not configured; release APK will be signed with the debug key"
            echo "KEYSTORE_PATH=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/release-keystore.jks" >> $GITHUB_OUTPUT
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.KEYSTORE_PATH }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g'
        run: |
          set +e
          flutter build apk --release --no-pub \
            --target-platform android-arm64 \
            --build-name ${{ steps.build_meta.outputs.SEMVER }} \
            --build-number ${{ steps.build_meta.outputs.BUILD_NUMBER }} 2>&1 | tee build-release.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::error::Release APK build failed with status $status"
            grep -E -i \
              'FAILURE:|What went wrong|Execution failed|Missing class|OutOfMemory|Could not|Exception|Error:' \
              build-release.log || true
            echo "::group::Release build log tail"
            tail -n 200 build-release.log
            echo "::endgroup::"
            exit "$status"
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: openwatch-release-${{ steps.build_meta.outputs.SEMVER }}+${{ steps.build_meta.outputs.BUILD_NUMBER }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Create GitHub Release
        if: |
          (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '+')) ||
          github.ref == 'refs/heads/master' ||
          github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || steps.build_meta.outputs.UNIQUE_TAG }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('OpenWatch {0}', github.ref_name) || format('OpenWatch {0}', steps.build_meta.outputs.UNIQUE_TAG) }}
          draft: false
          prerelease: false
          generate_release_notes: true
          # only explicit v* tags are "latest"; rolling CI releases are not
          make_latest: ${{ startsWith(github.ref, 'refs/tags/v') }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Flutter CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze-and-test
    # Build and publish a release APK on every main/master commit, plus
    # explicit version tags and manual dispatches. This depends on the
    # fast analyze-and-test job so a broken tree never produces a release
    # artifact.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !contains(github.ref_name, '+') && (
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      ))
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Determine build metadata
        id: build_meta
        run: |
          SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1 | tr -d ' ')
          BUILD_NUMBER=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} ))
          # include the run id so each master push gets a fresh, unique tag
          UNIQUE_TAG="v${SEMVER}+${BUILD_NUMBER}-${GITHUB_SHA::7}"
          echo "SEMVER=$SEMVER" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "UNIQUE_TAG=$UNIQUE_TAG" >> $GITHUB_OUTPUT
          echo "Building version $SEMVER+$BUILD_NUMBER (tag $UNIQUE_TAG)"

      - name: Prepare signing keystore
        id: keystore
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::Keystore not configured; release APK will be signed with the debug key"
            echo "KEYSTORE_PATH=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/release-keystore.jks" >> $GITHUB_OUTPUT
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.KEYSTORE_PATH }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g'
        run: |
          set +e
          flutter build apk --release --no-pub \
            --target-platform android-arm64 \
            --build-name ${{ steps.build_meta.outputs.SEMVER }} \
            --build-number ${{ steps.build_meta.outputs.BUILD_NUMBER }} 2>&1 | tee build-release.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::error::Release APK build failed with status $status"
            grep -E -i \
              'FAILURE:|What went wrong|Execution failed|Missing class|OutOfMemory|Could not|Exception|Error:' \
              build-release.log || true
            echo "::group::Release build log tail"
            tail -n 200 build-release.log
            echo "::endgroup::"
            exit "$status"
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: openwatch-release-${{ steps.build_meta.outputs.SEMVER }}+${{ steps.build_meta.outputs.BUILD_NUMBER }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Create GitHub Release
        if: |
          (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '+')) ||
          github.ref == 'refs/heads/master' ||
          github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.build_meta.outputs.UNIQUE_TAG }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          # If a release with this tag already exists, drop the disambiguator
          # and re-use it (e.g. a re-run with the same build_number).
          if [ -n "${{ steps.build_meta.outputs.EXISTING_TAG }}" ]; then
            TAG="${{ steps.build_meta.outputs.EXISTING_TAG }}"
          fi
          APK="build/app/outputs/flutter-apk/app-release.apk"
          ls -la "$APK"
          echo "Creating release $TAG"
          RESP=$(curl -sS -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"OpenWatch $TAG\",\"body\":\"OpenWatch $TAG ($SHORT_SHA)\"}")
          ID=$(printf '%s' "$RESP" | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get("id",""))')
          if [ -z "$ID" ]; then
            echo "::error::Release create failed: $RESP"
            exit 1
          fi
          echo "Release id=$ID, uploading APK"
          UPL=$(curl -sS -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$APK" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$ID/assets?name=$(basename "$APK")")
          URL=$(printf '%s' "$UPL" | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get("browser_download_url",""))')
          echo "Asset URL: $URL"
          # Mark explicit v* tags as Latest; rolling CI builds are not.
          if ${{ startsWith(github.ref, 'refs/tags/v') }}; then
            curl -sS -X PATCH \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$ID" \
              -d '{"make_latest":"true"}' >/dev/null
          fi
